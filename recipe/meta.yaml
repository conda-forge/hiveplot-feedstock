{% set version = "0.1.8.4" %}
{% set pkgname = "hiveplot" %}

package:
    name: {{ pkgname }}
    version: {{ version }}

source:
    fn: {{ pkgname }}-{{ version }}.tar.gz
    url: https://pypi.org/packages/source/{{ pkgname[0] }}/{{ pkgname }}/{{ pkgname }}-{{ version }}.tar.gz
    md5: 08171310271823a83aff8269eeed2392

build:
    noarch: python
    number: 2
    script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
    host:
        - python {{ python_min }}
        - setuptools
        - pip
    run:
        - python >={{ python_min }}
        - matplotlib
        - numpy

test:
    requires:
        - python {{ python_min }}
    imports:
        - hiveplot

about:
    home: http://github.com/ericmjl/hiveplot
    license: MIT
    license_file: LICENSE
    summary: 'Hive plots in Python!'

extra:
    recipe-maintainers:
        - ericmjl
